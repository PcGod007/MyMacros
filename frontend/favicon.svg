<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
    <!-- Protein Circle (Blue) -->
    <circle cx="40" cy="40" r="36" fill="none" stroke="#2563eb" stroke-width="4" opacity="0.2" />
    <circle cx="40" cy="40" r="36" fill="none" stroke="#2563eb" stroke-width="4" stroke-dasharray="60 170" stroke-linecap="round" />
    
    <!-- Carbs Circle (Yellow) -->
    <circle cx="40" cy="40" r="28" fill="none" stroke="#fbbf24" stroke-width="3.5" opacity="0.2" />
    <circle cx="40" cy="40" r="28" fill="none" stroke="#fbbf24" stroke-width="3.5" stroke-dasharray="45 135" stroke-linecap="round" transform="rotate(45 40 40)" />
    
    <!-- Fats Circle (Red) -->
    <circle cx="40" cy="40" r="20" fill="none" stroke="#f43f5e" stroke-width="3" opacity="0.2" />
    <circle cx="40" cy="40" r="20" fill="none" stroke="#f43f5e" stroke-width="3" stroke-dasharray="30 100" stroke-linecap="round" transform="rotate(90 40 40)" />
</svg>
